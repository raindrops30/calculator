<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <h1>This is my Calculator!</h1>
    <div class="calculator">
        <div class="display"><h3 id="digitDisplay">Display</h3></div>
        <div class="buttons">
            <button id="b0" class="cBtn">0</button>
            <button id="b1" class="cBtn">1</button>
            <button id="b2" class="cBtn">2</button>
            <button id="b3" class="cBtn">3</button>
            <button id="b4" class="cBtn">4</button>
            <button id="b5" class="cBtn">5</button>
            <button id="b6" class="cBtn">6</button>
            <button id="b7" class="cBtn">7</button>
            <button id="b8" class="cBtn">8</button>
            <button id="b9" class="cBtn">9</button>
            <button id="bPlus" class="cBtn">+</button>
            <button id="bMinus" class="cBtn">-</button>
            <button id="bMultiply" class="cBtn">*</button>
            <button id="bDivide" class="cBtn">/</button>
            <button id="bEquals" class="cBtn">=</button>
        </div>
    </div>
</body>

<script src="main.js"></script>
</html>
